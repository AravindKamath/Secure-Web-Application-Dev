###############################################################################
# aide.conf — AIDE (Advanced Intrusion Detection Environment) Configuration
#
# Purpose: Monitor critical file integrity across PERN-Store production
#          deployment, with emphasis on Data Zone protection.
#
# Usage:
#   Initialize database:  aide --init --config=/etc/aide/aide.conf
#   Run check:            aide --check --config=/etc/aide/aide.conf
#   Update after changes: aide --update --config=/etc/aide/aide.conf
#
# Schedule via cron:
#   0 3 * * * /usr/bin/aide --check --config=/etc/aide/aide.conf | mail -s "AIDE Report" admin@example.com
#
# PERN-Store Deployment Architecture:
#   DMZ (Web Zone):  nginx reverse proxy
#   App Zone:        Node.js API server
#   Data Zone:       PostgreSQL (Docker internal network)
###############################################################################

# ── Database Configuration ──────────────────────────────────────────────────
database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new
database_new=file:/var/lib/aide/aide.db.new

# ── Logging ─────────────────────────────────────────────────────────────────
report_url=file:/var/log/aide/aide.log
report_url=stdout
verbose=5

# ── Rule Definitions ────────────────────────────────────────────────────────
# NORMAL  = p+i+n+u+g+s+b+m+c+sha256+xattrs
#   Full integrity check: permissions, inode, links, user, group, size,
#   block count, modification time, change time, SHA-256 hash, xattrs
NORMAL = p+i+n+u+g+s+b+m+c+sha256+xattrs

# DATAONLY = p+n+u+g+s+sha256
#   Data integrity only: skip inode/time metadata (for files that rotate)
DATAONLY = p+n+u+g+s+sha256

# PERMS = p+u+g+acl+xattrs
#   Permission monitoring only: ownership, ACLs, extended attributes
PERMS = p+u+g+acl+xattrs

# LOG = p+u+g+i+n+S
#   Log file monitoring: track growth (S = size-growing-only)
LOG = p+u+g+i+n+S

# DIR = p+i+n+u+g+acl+xattrs
#   Directory monitoring: permissions and attributes
DIR = p+i+n+u+g+acl+xattrs

###############################################################################
# DATA ZONE — PostgreSQL (Highest Priority)
###############################################################################

# PostgreSQL data directory (Docker volume mount point)
/var/lib/docker/volumes/pern-store_pgdata/_data DATAONLY

# Database initialization scripts (should NEVER change after deployment)
/docker-entrypoint-initdb.d NORMAL

# PostgreSQL configuration files
/var/lib/docker/volumes/pern-store_pgdata/_data/postgresql.conf NORMAL
/var/lib/docker/volumes/pern-store_pgdata/_data/pg_hba.conf NORMAL
/var/lib/docker/volumes/pern-store_pgdata/_data/pg_ident.conf NORMAL

###############################################################################
# APPLICATION ZONE — Node.js API
###############################################################################

# Application source code (should not change without deployment)
/opt/pern-store/server NORMAL

# Application configuration
/opt/pern-store/server/config NORMAL

# Environment files (critical secrets)
/opt/pern-store/server/.env.production NORMAL
/opt/pern-store/server/.env.production.local NORMAL

# RSA keys for JWT signing
/opt/pern-store/server/keys NORMAL

# Node.js dependencies (should match lockfile)
/opt/pern-store/server/node_modules DATAONLY

# Application logs (monitor for tampering, allow growth)
/opt/pern-store/server/logs LOG

###############################################################################
# DMZ (WEB ZONE) — Nginx
###############################################################################

# Nginx configuration (should not change without deployment)
/etc/nginx/nginx.conf NORMAL
/etc/nginx/conf.d NORMAL

# Static frontend build (should not change without deployment)
/var/www/html DATAONLY

# TLS certificates
/etc/nginx/ssl NORMAL

###############################################################################
# DOCKER RUNTIME — Container Infrastructure
###############################################################################

# Docker daemon configuration
/etc/docker/daemon.json NORMAL

# Docker Compose production file
/opt/pern-store/docker-compose.prod.yml NORMAL

# Docker socket (critical — container escape vector)
/var/run/docker.sock PERMS

# Container runtime binaries
/usr/bin/docker NORMAL
/usr/bin/docker-compose NORMAL
/usr/bin/containerd NORMAL
/usr/bin/runc NORMAL

###############################################################################
# SYSTEM BINARIES & CONFIGURATION
###############################################################################

# System binaries
/usr/bin NORMAL
/usr/sbin NORMAL
/bin NORMAL
/sbin NORMAL

# System configuration
/etc/passwd NORMAL
/etc/shadow NORMAL
/etc/group NORMAL
/etc/sudoers NORMAL
/etc/sudoers.d NORMAL

# SSH configuration
/etc/ssh/sshd_config NORMAL
/etc/ssh/ssh_config NORMAL
/root/.ssh NORMAL

# Firewall configuration
/etc/ufw NORMAL

# Fail2Ban configuration
/etc/fail2ban NORMAL

# Crontab
/etc/crontab NORMAL
/etc/cron.d NORMAL
/etc/cron.daily DIR
/etc/cron.weekly DIR
/etc/cron.monthly DIR

# systemd service units
/etc/systemd/system NORMAL
/lib/systemd/system NORMAL

# PAM configuration
/etc/pam.d NORMAL

# Kernel modules
/etc/modprobe.d NORMAL
/lib/modules NORMAL

###############################################################################
# EXCLUSIONS — Files/dirs that change frequently (false positive reduction)
###############################################################################

# System logs (monitored by auditd instead)
!/var/log/.*
!/var/log/syslog
!/var/log/auth.log

# Package manager caches
!/var/cache/.*
!/var/lib/apt/.*

# Temporary files
!/tmp
!/var/tmp
!/run

# Docker overlay filesystem (too volatile)
!/var/lib/docker/overlay2
!/var/lib/docker/containers/.*/log
!/var/lib/docker/containers/.*/hostname
!/var/lib/docker/containers/.*/resolv.conf

# AIDE's own database
!/var/lib/aide/.*

# Proc and sys pseudo-filesystems
!/proc
!/sys
!/dev
