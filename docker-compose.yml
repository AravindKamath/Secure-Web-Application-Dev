  #     - ./db:/var/lib/postgresql/data
  #     - ./server/config/init.sql:/docker-entrypoint-initdb.d/init.sql
  # pgadmin:
  #   image: dpage/pgadmin4
  #   env_file:
  #     - ./pgadmin.env
  #   ports:
  #     - "16543:80"
  #   depends_on:
  #     - database
networks:
  pernstore: 
    driver: bridge
volumes:
  db:
    driver: local
