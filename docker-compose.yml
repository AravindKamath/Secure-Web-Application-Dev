version: "3.8"

services:
  server:
    image: pern-store-server
    container_name: pern-store-server
    build:
      context: ./server
      dockerfile: Dockerfile
    # restart: always
    env_file:
      - ./server/.env
    # All secrets loaded from ./server/.env — do NOT hardcode credentials here
    volumes:
      # Maps the server directory to
      # the working directory in the container
      - ./server:/usr/src/app
      # Maps the node_modules directory to
      # the working directory in the container
      # and also fixes bcrypt error
      - /usr/src/app/node_modules
    ports:
      - 9000:9000
    networks:
      - pernstore
    # depends_on:
    #   - database
  client:
    image: pern-store-client
    container_name: pern-store-client
    restart: unless-stopped
    env_file:
      - ./client/.env
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - 3001:3000
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - server
    networks:
      - pernstore
  # database:
  #   container_name: pern-store-db
  #   image: postgres:16
  #   restart: always
  #   env_file:
  #     - ./server/.env
  #   # All secrets loaded from ./server/.env — do NOT hardcode credentials here
  #   ports:
  #     - 7890:5432
