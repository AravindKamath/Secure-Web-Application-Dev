version: "3.8"

services:
  server:
    image: pern-store-server
    container_name: pern-store-server
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    # restart: always
    env_file:
      - ./server/.env

    volumes:
      # Maps the server directory to
      # the working directory in the container
      - ./server:/usr/src/app
      # Maps the node_modules directory to
      # the working directory in the container
      # and also fixes bcrypt error
      - /usr/src/app/node_modules
    ports:
      - 9000:9000
    networks:
      - pernstore
    depends_on:
      - database
  client:
    image: pern-store-client
    container_name: pern-store-client
    restart: unless-stopped
    env_file:
      - ./client/.env
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - 3001:3000
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - server
    networks:
      - pernstore
  database:
    container_name: pern-store-db
    image: postgres:16
    restart: always
    env_file:
      - ./server/.env
    # All secrets loaded from ./server/.env — do NOT hardcode credentials here
    ports:
      - 7890:5432
    volumes:
      - ./db:/var/lib/postgresql/data
      # When the PostgreSQL container is started it will run any scripts
      # provided in the `docker-entrypoint-initdb.d` directory
      # seed the database with the init.sql file
      - ./server/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pernstore
  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - ./pgadmin.env
    # Create pgadmin.env with PGADMIN_DEFAULT_EMAIL and PGADMIN_DEFAULT_PASSWORD
    ports:
      - "16543:80"
    depends_on:
      - database
    networks:
      - pernstore
networks:
  pernstore: 
    driver: bridge
volumes:
  db:
    driver: local
